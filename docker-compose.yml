services:
  api:
    build: .
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      - ./app:/app/app                          # python (already there)
      - ./app/api/static:/app/app/api/static    # ← static HTML live reload
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - DEBUG=${DEBUG}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - WHISPER_SERVICE_URL=${WHISPER_SERVICE_URL}
      - WHISPER_CALLBACK_BASE_URL=${WHISPER_CALLBACK_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - chrono_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chrono_postgres_data: